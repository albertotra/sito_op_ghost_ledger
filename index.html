<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST LEDGER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <div id="boot-container">
            <div class="terminal" id="boot-terminal" style="display:none;">
                <div class="title-bar">
                    <span>GHOST SYSTEM v2.3</span>
                    <div class="status-dot"></div>
                </div>
                <div id="boot-output"></div>
                <div id="login-area" style="display:none;">
                    <div class="login-line">
                        <span class="prompt-text">CODICE DI ACCESSO &gt;&nbsp;</span>
                        <input type="text" id="login-input" autocomplete="off" spellcheck="false">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
